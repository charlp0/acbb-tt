<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">

<title>ACBB TT — Stats Ch. Équipe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Saira+Condensed:ital,wght@0,600;0,700;0,800;1,700;1,800&family=JetBrains+Mono:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0B0D;
    --paper:#141416;
    --panel:#141416;
    --panel-2:#1E1E22;
    --line:rgba(255,255,255,0.08);
    --line-2:rgba(255,255,255,0.16);
    --ink:#F6F5F3;
    --ink-2:#D4D3CF;
    --dim:rgba(246,245,243,0.60);
    --dimmer:rgba(246,245,243,0.48);
    --acbb:#F26A1B;
    --orange:#F26A1B;
    --win:#3DD68C;
    --win-bg:rgba(61,214,140,0.12);
    --win-deep:#22C55E;
    --warn:#FACC15;
    --warn-bg:rgba(250,204,21,0.12);
    --warn-deep:#EAB308;
    --alert:#FB923C;
    --alert-bg:rgba(251,146,60,0.14);
    --alert-deep:#F97316;
    --lose:#F26356;
    --lose-bg:rgba(242,99,86,0.12);
    --lose-deep:#EF4444;
    --draw:#FACC15;
    --draw-bg:rgba(250,204,21,0.12);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--ink);font-family:"Space Grotesk",system-ui,sans-serif;font-size:14px;line-height:1.4}
  body{min-height:100vh;padding-bottom:40px;max-width:600px;margin:0 auto;background:var(--paper);border-left:1px solid var(--line);border-right:1px solid var(--line)}
  ::-webkit-scrollbar{display:none}

  .header{
    position:sticky;top:0;z-index:50;padding:12px 16px 11px;
    background:rgba(11,11,13,0.85);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--line);
  }
  .header-row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .back-link{
    display:inline-flex;align-items:center;gap:8px;
    padding:8px 12px 8px 9px;border-radius:99px;
    background:var(--panel);border:1px solid var(--line-2);
    color:var(--ink);font-size:12px;font-weight:600;letter-spacing:-0.1px;
    text-decoration:none;
  }
  .back-link svg{width:12px;height:12px}
  .head-title{display:flex;flex-direction:column;align-items:flex-end;line-height:1.1}
  .head-title .t{font-size:13px;font-weight:700;letter-spacing:-0.3px}
  .head-title .s{font-size:9px;color:var(--dim);font-family:"JetBrains Mono",monospace;letter-spacing:0.5px;text-transform:uppercase;margin-top:3px}

  .hero{
    padding:22px 18px 18px;
  }
  .hero-eyebrow{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--orange);display:flex;align-items:center;gap:6px}
  .hero-eyebrow::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--orange)}
  .hero-title{
    margin:12px 0 6px;font-size:38px;line-height:1.04;letter-spacing:0.5px;font-weight:800;
    font-style:italic;text-transform:uppercase;
    font-family:"Saira Condensed",system-ui,sans-serif;
  }
  .hero-title em{font-style:italic;color:var(--orange)}
  .hero-meta{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);margin-top:18px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .hero-meta > div{background:var(--paper);padding:10px 8px;text-align:center}
  .hero-meta .v{font-family:"JetBrains Mono",monospace;font-size:18px;font-weight:800;color:var(--ink);line-height:1}
  .hero-meta .l{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;font-weight:600;margin-top:5px}

  /* Controls */
  .controls{
    padding:14px 16px;display:flex;flex-direction:column;gap:10px;
    border-top:1px solid var(--line);background:rgba(11,11,13,0.72);backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);
    position:sticky;top:52px;z-index:40;
  }
  .search-row{display:flex;gap:8px;align-items:center}
  .search-input{
    flex:1;padding:9px 14px;border-radius:99px;
    background:var(--paper);border:1px solid var(--line-2);
    font-family:"Space Grotesk",sans-serif;font-size:13px;font-weight:500;color:var(--ink);
    outline:none;
  }
  .search-input::placeholder{color:var(--dim)}
  .search-input:focus{border-color:var(--ink)}
  .sort-btn{
    padding:9px 14px;border-radius:99px;background:var(--paper);border:1px solid var(--line-2);
    font-family:"Space Grotesk",sans-serif;font-size:12px;font-weight:600;color:var(--ink);
    cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:5px;
  }
  .sort-btn .arrow{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--dim)}
  .filters{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap}
  .chip{
    padding:5px 11px;border-radius:99px;
    background:var(--paper);border:1px solid var(--line-2);
    font-family:"JetBrains Mono",monospace;font-size:11px;font-weight:600;color:var(--ink-2);
    cursor:pointer;white-space:nowrap;flex-shrink:0;letter-spacing:0.3px;
  }
  .chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .chip .ct{margin-left:5px;color:var(--dim);font-weight:500}
  .chip.active .ct{color:rgba(255,255,255,0.55)}

  /* Player list */
  .list{padding:8px 12px 0}
  .player-card{
    background:var(--paper);border:1px solid var(--line);border-radius:12px;
    padding:14px 14px 12px;margin-bottom:8px;
    transition:border-color .15s;
  }
  .player-card.expanded{border-color:var(--line-2)}
  .pc-top{display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center;cursor:pointer}
  .pc-rank{
    font-family:"Saira Condensed",system-ui,sans-serif;font-size:22px;line-height:1;color:var(--dimmer);min-width:28px;text-align:center;
  }
  .player-card.top1 .pc-rank{color:var(--draw)}
  .player-card.top2 .pc-rank{color:var(--ink-2)}
  .player-card.top3 .pc-rank{color:var(--lose)}
  .pc-info{min-width:0}
  .pc-name{font-size:15px;font-weight:700;letter-spacing:-0.3px;line-height:1.15}
  .pc-sub{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--dim);margin-top:2px;letter-spacing:0.2px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .pc-sub .dot{width:3px;height:3px;border-radius:50%;background:var(--dimmer)}
  .pc-stats{display:flex;align-items:baseline;gap:14px}
  .pc-stat-v{
    font-family:"JetBrains Mono",monospace;font-size:22px;font-weight:800;line-height:1;letter-spacing:-0.5px;
    text-align:right;color:var(--ink);
  }
  .pc-stat-v .s{font-size:10px;color:var(--dim);font-weight:600;letter-spacing:0.3px;margin-left:2px}
  .pc-stat-pct{
    font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:700;color:var(--ink-2);
    padding:3px 7px;border-radius:5px;background:var(--panel-2);min-width:46px;text-align:center;letter-spacing:-0.2px;
  }
  .pc-stat-pct.hi{background:var(--win-bg);color:#86EFAC}
  .pc-stat-pct.lo{background:var(--lose-bg);color:#FCA5A5}
  .pc-stat-pct.mid{background:var(--draw-bg);color:var(--draw)}
  .pc-bar{height:4px;background:var(--line);border-radius:99px;overflow:hidden;margin:10px 0 0}
  .pc-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--acbb) 0%,var(--draw) 100%);border-radius:99px;transition:width 1s cubic-bezier(.2,.7,.3,1)}

  .pc-teams{display:flex;flex-wrap:wrap;gap:4px;margin-top:10px}
  .team-tag{
    display:inline-flex;align-items:center;gap:5px;
    padding:3px 8px;border-radius:99px;
    background:var(--panel-2);border:1px solid var(--line);
    font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:700;color:var(--ink-2);letter-spacing:0.2px;
  }
  .team-tag .lvl{font-size:8px;font-weight:500;color:var(--dim);letter-spacing:0.4px;text-transform:uppercase}
  .team-tag .n{font-size:9px;color:var(--dim);font-weight:500}
  .team-tag.f{background:#F4E8DA;border-color:#E5D4BC}

  .empty{padding:40px 20px;text-align:center;color:var(--dim);font-size:13px}

  .anim-in{animation:fadeUp .35s cubic-bezier(.2,.7,.3,1)}
  @keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  /* ===== UNIFIED HEADER ===== */
  .header{position:sticky;top:0;z-index:50;padding:10px 12px;background:rgba(11,11,13,0.72);backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);border-bottom:1px solid var(--line)}
  .header-row{display:flex;align-items:center;justify-content:space-between;gap:8px}
  .brand{display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--ink);flex-shrink:0}
  .brand-img{width:34px;height:34px;border-radius:8px;background:#fff;padding:2px;border:1px solid var(--line-2);object-fit:contain;flex-shrink:0}
  .brand-text{display:none;flex-direction:column;line-height:1}
  @media (min-width:560px){.brand-text{display:flex}}
  .brand-name{font-size:12px;font-weight:700;letter-spacing:-0.3px;color:var(--ink)}
  .brand-sub{font-size:8.5px;color:var(--dim);margin-top:3px;font-family:"JetBrains Mono",monospace;letter-spacing:0.3px;text-transform:uppercase;white-space:nowrap}
  .nav{display:flex;align-items:center;gap:3px}
  .nav-link{padding:7px 9px;border-radius:99px;font-size:11px;font-weight:600;color:var(--ink-2);text-decoration:none;white-space:nowrap;letter-spacing:-0.1px;border:1px solid transparent}
  .nav-link:hover{color:var(--ink);background:rgba(255,255,255,0.04)}
  .nav-link.active{background:var(--panel-2);color:var(--ink);border-color:var(--line-2)}
  .nav-cta{display:inline-flex;align-items:center;gap:5px;padding:8px 11px;border-radius:99px;background:var(--orange);color:#fff;border:1px solid var(--orange);font-size:11px;font-weight:700;text-decoration:none;letter-spacing:0.2px;white-space:nowrap}
  .nav-cta::before{content:"";width:5px;height:5px;border-radius:50%;background:#fff}
  .nav-cta.active{background:var(--orange);border-color:var(--orange)}
  .nav-cta.active::before{background:#fff}
  @media (max-width:420px){
    .nav-link{padding:7px 8px;font-size:10.5px}
    .nav-cta{padding:7px 10px;font-size:10.5px}
    .brand-img{width:32px;height:32px}
  }

  /* Tabs */
  .tabbar{display:flex;gap:6px;padding:14px 12px 4px;background:var(--paper)}
  .tab{flex:1;padding:11px 10px;border-radius:11px;background:var(--paper);border:1px solid var(--line-2);
    color:var(--ink-2);font-family:"Saira Condensed",system-ui,sans-serif;font-style:italic;font-weight:800;
    text-transform:uppercase;letter-spacing:0.4px;font-size:14px;cursor:pointer;transition:all .15s}
  .tab:hover{color:var(--ink)}
  .tab.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
  .tabview{animation:fade .2s ease}
  .tabview[hidden]{display:none}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

  /* Niveau adverse */
  .adv-intro{padding:14px 16px 4px;color:var(--dim);font-size:12.5px;line-height:1.5}
  .adv-block{padding:8px 12px 0}
  .adv-h{font-family:"Saira Condensed",system-ui,sans-serif;font-style:italic;font-weight:800;text-transform:uppercase;
    letter-spacing:0.5px;font-size:16px;color:var(--ink);margin:16px 4px 8px;display:flex;align-items:center;gap:8px}
  .adv-h::before{content:"";width:4px;height:15px;border-radius:2px;background:var(--orange)}
  .adv-row{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:8px}
  .adv-row-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .adv-badge{font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:800;padding:3px 7px;border-radius:6px;
    background:var(--panel-2);color:var(--ink-2);letter-spacing:0.3px;white-space:nowrap}
  .adv-name{font-weight:700;font-size:14px;letter-spacing:-0.2px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .adv-diff{font-family:"JetBrains Mono",monospace;font-size:12px;font-weight:800;padding:2px 8px;border-radius:99px;white-space:nowrap}
  .adv-diff.up{color:var(--win-lt);background:rgba(61,214,140,0.14)}
  .adv-diff.down{color:var(--lose-lt);background:rgba(242,99,86,0.14)}
  .adv-diff.eq{color:var(--dim);background:var(--panel-2)}
  .adv-bars{display:flex;flex-direction:column;gap:7px}
  .adv-bar{display:grid;grid-template-columns:74px 1fr 46px;gap:9px;align-items:center}
  .adv-bar .bl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.4px;font-weight:700}
  .adv-bar .bt{height:9px;border-radius:99px;background:var(--panel-2);overflow:hidden;position:relative}
  .adv-bar .bf{height:100%;border-radius:99px}
  .adv-bar.acbb .bf{background:linear-gradient(90deg,var(--orange),#ff8a3d)}
  .adv-bar.opp .bf{background:linear-gradient(90deg,#6b7280,#9ca3af)}
  .adv-bar .bv{font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:800;text-align:right}
  .adv-bar.acbb .bv{color:var(--orange)}
  .adv-bar.opp .bv{color:var(--ink-2)}
  .adv-meta{margin-top:9px;font-size:10px;color:var(--dim);font-family:"JetBrains Mono",monospace;letter-spacing:0.3px}
  .adv-genre{font-family:"Saira Condensed",system-ui,sans-serif;font-style:italic;font-weight:800;text-transform:uppercase;
    letter-spacing:0.6px;font-size:12px;color:var(--orange);margin:14px 4px 7px}
</style>

<script>
/* === Shared utils === */
// Shared helpers for ACBB TT redesigns
// All variations import this to derive stats from the raw DATA object.

(function (root) {
  const TEAM_KEYS = ['F1','F2','F3','M2','M3','M4','M5','M6','M7','M8','M9','M10','M11','M12','M13','M14','M15','M16','M17'];

  // Mapping from team key → level meta for selector grouping
  const LEVEL_META = {
    'M2':  { short: 'N2', label: 'Nationale 2', tier: 0 },
    'F1':  { short: 'PN', label: 'Pré-Nationale', tier: 1 },
    'M3':  { short: 'R2', label: 'Régional 2', tier: 2 },
    'M4':  { short: 'R3', label: 'Régional 3', tier: 2 },
    'M5':  { short: 'R3', label: 'Régional 3', tier: 2 },
    'F2':  { short: 'R1', label: 'Régional 1', tier: 2 },
    'F3':  { short: 'PR', label: 'Pré-Régional', tier: 3 },
    'M6':  { short: 'PR', label: 'Pré-Régional', tier: 3 },
    'M7':  { short: 'PR', label: 'Pré-Régional', tier: 3 },
    'M8':  { short: 'PR', label: 'Pré-Régional', tier: 3 },
    'M9':  { short: 'PR', label: 'Pré-Régional', tier: 3 },
    'M10': { short: 'D1', label: 'Départemental 1', tier: 4 },
    'M11': { short: 'D1', label: 'Départemental 1', tier: 4 },
    'M12': { short: 'D2', label: 'Départemental 2', tier: 5 },
    'M13': { short: 'D2', label: 'Départemental 2', tier: 5 },
    'M14': { short: 'D2', label: 'Départemental 2', tier: 5 },
    'M15': { short: 'D2', label: 'Départemental 2', tier: 5 },
    'M16': { short: 'D2', label: 'Départemental 2', tier: 5 },
    'M17': { short: 'D2', label: 'Départemental 2', tier: 5 },
  };

  function getAcbbTeam(poolKey) {
    const pool = root.DATA[poolKey];
    if (!pool) return null;
    return pool.teams.find(t => t.acbb);
  }

  // Is a team key (e.g. "M2") a Nationale 2 team (uses 8-1 victory scoring vs 25-17 point scoring)
  function isNat2(poolKey) {
    return poolKey === 'M2';
  }

  // Take a journée from the ACBB team; return enriched info
  function enrichJournee(j, isN2) {
    const won = j.match_score > j.opp_score;
    const drawn = j.match_score === j.opp_score;
    const lost = j.match_score < j.opp_score;
    const result = won ? 'W' : (lost ? 'L' : 'D');
    // MVP = player with most victories
    const ranked = [...j.players].sort((a,b) => b.vic - a.vic);
    const mvp = ranked[0];
    const totalVic = j.players.reduce((s,p)=>s+p.vic,0);
    return { ...j, won, drawn, lost, result, mvp, totalVic };
  }

  // Aggregated player stats across all journées for ACBB team
  function aggregatePlayers(acbbTeam) {
    const stats = {};
    acbbTeam.journees.forEach(j => {
      j.players.forEach(p => {
        if (!p.nom || p.nom === 'Joueur absent') return;
        const key = p.nom + '|' + p.prenom;
        if (!stats[key]) stats[key] = {
          nom: p.nom, prenom: p.prenom, cls: p.cls, vic: 0, played: 0
        };
        stats[key].vic += p.vic;
        stats[key].played += 1;
        stats[key].cls = p.cls; // latest
      });
    });
    return Object.values(stats).sort((a,b) => b.vic - a.vic);
  }

  // Build calendar with results merged in
  function buildCalendar(acbbTeam, isN2) {
    const cal = acbbTeam.calendar || {};
    const journeesByNum = {};
    (acbbTeam.journees || []).forEach(j => { journeesByNum[j.journee] = j; });
    const out = [];
    for (let i = 1; i <= 7; i++) {
      const slot = cal[i] || journeesByNum[i] || null;
      const j = journeesByNum[i];
      const opponent = (slot && slot.opponent) || (j && j.opponent) || '—';
      const domext = (slot && slot.domext) || (j && j.domext) || '—';
      const played = !!j && (j.match_score != null);
      let result = null;
      if (played) {
        if (j.match_score > j.opp_score) result = 'W';
        else if (j.match_score < j.opp_score) result = 'L';
        else result = 'D';
      }
      out.push({
        journee: i,
        opponent,
        domext,
        date: j && j.date,
        played,
        result,
        match_score: j && j.match_score,
        opp_score: j && j.opp_score,
        raw: j || null,
      });
    }
    return out;
  }

  // Pool average classement for ACBB players + opponents (rough avg)
  function poolAverages(poolKey) {
    const pool = root.DATA[poolKey];
    if (!pool) return { acbb: '—', opp: '—' };
    const acbb = pool.teams.find(t => t.acbb);
    function avgCls(team) {
      if (!team) return null;
      const allCls = [];
      (team.journees || []).forEach(j => j.players.forEach(p => {
        if (!p.nom || p.nom === 'Joueur absent') return;
        const c = typeof p.cls === 'number' ? p.cls : 500;
        allCls.push(c);
      }));
      if (!allCls.length) return null;
      return Math.round(allCls.reduce((s,v)=>s+v,0) / allCls.length);
    }
    const acbbAvg = avgCls(acbb);
    const oppCls = [];
    pool.teams.filter(t => !t.acbb).forEach(t => {
      const a = avgCls(t);
      if (a) oppCls.push(a);
    });
    const oppAvg = oppCls.length ? Math.round(oppCls.reduce((s,v)=>s+v,0)/oppCls.length) : null;
    return { acbb: acbbAvg || '—', opp: oppAvg || '—' };
  }

  // Stats summary for ACBB team header
  function teamSummary(poolKey) {
    const pool = root.DATA[poolKey];
    const acbb = pool && pool.teams.find(t => t.acbb);
    if (!acbb) return { played: 0, wins:0, losses:0, draws:0, ptsFor:0, ptsAg:0 };
    let wins=0, losses=0, draws=0, pf=0, pa=0;
    (acbb.journees || []).forEach(j => {
      if (j.match_score == null) return;
      pf += j.match_score;
      pa += j.opp_score;
      if (j.match_score > j.opp_score) wins++;
      else if (j.match_score < j.opp_score) losses++;
      else draws++;
    });
    return {
      played: wins+losses+draws,
      wins, losses, draws,
      ptsFor: pf, ptsAg: pa,
      diff: pf - pa,
    };
  }

  // Find ACBB row in standings
  function findAcbbStanding(poolKey) {
    const st = root.STANDINGS[poolKey];
    if (!st) return null;
    // Match "BOULOGNE BILLAN" prefix
    return st.find(r => /BOULOGNE BILLAN|BOULOGNE BILLANCOURT/i.test(r.name)) || null;
  }

  // French short date
  function shortDate(s) {
    if (!s) return '—';
    return s.replace(/\s?\d{4}$/, ''); // strip year
  }

  // Display classement (numeric or string like "N241")
  function clsDisplay(c) {
    if (c == null) return '—';
    if (typeof c === 'string') {
      if (c === 'x' || c === '?' || c === '') return '—';
      return c;
    }
    return String(c);
  }

  function firstName(p) {
    if (!p) return '—';
    return p.prenom || p.nom;
  }
  function shortName(p) {
    return (firstName(p)[0] || '') + '. ' + (p.nom || '');
  }

  // Strip "BOULOGNE BILLANCOURT" prefix from opponent display
  function shortOpp(name) {
    if (!name) return '—';
    return name
      .replace(/^BOULOGNE BILLAN(COURT)?(\s+AC)?\s*/i, 'ACBB ')
      .replace(/\s+\(\d+\)$/, '')
      .trim();
  }

  // Lookup opponent's lineup for a given journée number (the opponent team also has
  // its own `journees` entry — find theirs matching the same J number).
  function getOpponentLineup(poolKey, journeeNum, opponentName) {
    const pool = root.DATA[poolKey];
    if (!pool || !opponentName) return null;
    const opp = pool.teams.find(t => !t.acbb && (t.name === opponentName || t.name.toUpperCase() === opponentName.toUpperCase()));
    if (!opp) return null;
    const j = (opp.journees || []).find(x => x.journee === journeeNum);
    if (!j) return { team: opp, journee: null };
    return { team: opp, journee: j };
  }

  // Average classement for a lineup (numeric only, ignoring "N###" or absent players)
  function lineupAvgCls(players) {
    if (!players || !players.length) return null;
    const nums = players
      .filter(p => p.nom && p.nom !== 'Joueur absent')
      .map(p => {
        if (typeof p.cls === 'number') return p.cls;
        // "N241" etc — treat numeric prefix as ~1700+ ; rough heuristic
        if (typeof p.cls === 'string' && /^N\d+/i.test(p.cls)) return 1700;
        return null;
      })
      .filter(v => v != null);
    if (!nums.length) return null;
    return Math.round(nums.reduce((s,v)=>s+v,0) / nums.length);
  }

  // Aggregate all ACBB players across ALL teams (whole club) for the phase.
  // Returns rows with { nom, prenom, cls, vic, played, teams: ['M2','M3'...] }.
  function aggregateAllClubPlayers(pools) {
    const stats = {};
    (pools || TEAM_KEYS).forEach(k => {
      const acbb = getAcbbTeam(k);
      if (!acbb) return;
      (acbb.journees || []).forEach(j => {
        (j.players || []).forEach(p => {
          if (!p.nom || p.nom === 'Joueur absent') return;
          const key = (p.nom + '|' + (p.prenom || '')).replace(/-/g,' ').replace(/\s+/g,' ').trim().toUpperCase();
          if (!stats[key]) stats[key] = {
            nom: p.nom, prenom: p.prenom || '', cls: p.cls, vic: 0, played: 0, teamCounts: {}
          };
          stats[key].vic += (p.vic || 0);
          stats[key].played += 1;
          stats[key].cls = p.cls; // most recent record
          stats[key].teamCounts[k] = (stats[key].teamCounts[k] || 0) + 1;
        });
      });
    });
    return Object.values(stats).map(s => ({
      ...s,
      teams: Object.keys(s.teamCounts).sort((a,b) => {
        // by tier then by name
        const ta = (LEVEL_META[a] && LEVEL_META[a].tier) ?? 99;
        const tb = (LEVEL_META[b] && LEVEL_META[b].tier) ?? 99;
        return ta - tb || a.localeCompare(b);
      }),
      // Wins per match × 100 (max 3 wins per match in a normal 8x4 format; nat2 max 2)
      // Use vic / (played * 3) as best-of estimate; cap at 100.
      winRate: s.played ? Math.min(100, Math.round(s.vic / (s.played * 3) * 100)) : 0,
    }));
  }

  // Win % for a single player across the journées they played for a given team key
  // (max wins per match assumed to be 3 in normal format, 2 in Nationale 2)
  function playerWinRateInTeam(player, teamKey) {
    const acbb = getAcbbTeam(teamKey);
    if (!acbb) return { vic: 0, played: 0, max: 0, pct: 0 };
    const n2 = isNat2(teamKey);
    const matchMax = n2 ? 2 : 3;
    let vic = 0, played = 0;
    (acbb.journees || []).forEach(j => {
      (j.players || []).forEach(p => {
        if (p.nom === player.nom && (p.prenom || '') === (player.prenom || '')) {
          vic += (p.vic || 0);
          played += 1;
        }
      });
    });
    return { vic, played, max: played * matchMax, pct: played ? Math.round(vic / (played * matchMax) * 100) : 0 };
  }

  root.ACBB_UTILS = {
    TEAM_KEYS, LEVEL_META,
    getAcbbTeam, isNat2, enrichJournee, aggregatePlayers,
    buildCalendar, poolAverages, teamSummary, findAcbbStanding,
    shortDate, clsDisplay, firstName, shortName, shortOpp,
    getOpponentLineup, lineupAvgCls,
    aggregateAllClubPlayers, playerWinRateInTeam,
  };
  // ====== CLUB-WIDE STATS ======

  // Aggregate club-wide V/N/D, points, GA over the phase
  function aggregateClubStats() {
    let wins = 0, draws = 0, losses = 0, ptsFor = 0, ptsAg = 0, matches = 0;
    TEAM_KEYS.forEach(k => {
      const acbb = getAcbbTeam(k);
      if (!acbb) return;
      (acbb.journees || []).forEach(j => {
        if (j.match_score == null) return;
        matches++;
        ptsFor += j.match_score;
        ptsAg += j.opp_score;
        if (j.match_score > j.opp_score) wins++;
        else if (j.match_score < j.opp_score) losses++;
        else draws++;
      });
    });
    const all = aggregateAllClubPlayers();
    return {
      matches, wins, draws, losses,
      ptsFor, ptsAg, ga: ptsFor - ptsAg,
      winPct: matches ? Math.round(wins / matches * 100) : 0,
      players: all.length,
    };
  }

  // Status by position in standings: 1-2 promo, 3-5 safe, 6 watch, 7-8 danger
  function statusByPosition(poolKey) {
    const acbb = findAcbbStanding(poolKey);
    const st = root.STANDINGS[poolKey];
    if (!acbb || !st) return { pos: null, total: 0, status: 'unknown' };
    const total = st.length;
    const pos = acbb.pos;
    let status;
    if (pos <= 2) status = 'promo';      // green
    else if (pos <= 5) status = 'safe';  // yellow soft
    else if (pos === 6) status = 'watch'; // orange
    else status = 'danger';              // coral
    return { pos, total, status, pts: acbb.pts, V: acbb.V, N: acbb.N, D: acbb.D, diff: acbb.diff };
  }

  // Top players by win rate (min N matches played)
  function topByWinRate(n, minPlayed) {
    const all = aggregateAllClubPlayers().filter(p => p.played >= (minPlayed||3));
    return all.slice().sort((a,b) => b.winRate - a.winRate || b.vic - a.vic).slice(0, n||5);
  }

  // Top players by absolute volume of victories
  function topByVolume(n) {
    return aggregateAllClubPlayers().sort((a,b) => b.vic - a.vic || b.winRate - a.winRate).slice(0, n||5);
  }

  // Find primary team for a player (the team with most appearances)
  function primaryTeam(player) {
    const teams = player.teams || [];
    if (!teams.length) return null;
    const counts = player.teamCounts || {};
    return teams.slice().sort((a,b) => (counts[b]||0) - (counts[a]||0))[0];
  }

  // V/N/D per journée across the whole club
  function evolutionByJournee() {
    const result = {};
    for (let j = 1; j <= 7; j++) result[j] = { w: 0, d: 0, l: 0, total: 0 };
    TEAM_KEYS.forEach(k => {
      const acbb = getAcbbTeam(k);
      if (!acbb) return;
      (acbb.journees || []).forEach(j => {
        if (j.match_score == null) return;
        const bucket = result[j.journee];
        if (!bucket) return;
        bucket.total++;
        if (j.match_score > j.opp_score) bucket.w++;
        else if (j.match_score < j.opp_score) bucket.l++;
        else bucket.d++;
      });
    });
    return result;
  }

  // Records of the phase: biggest win, biggest loss, MVP (highest cumulative V over phase)
  function recordsOfPhase() {
    let bestWin = null, worstLoss = null;
    TEAM_KEYS.forEach(k => {
      const acbb = getAcbbTeam(k);
      if (!acbb) return;
      (acbb.journees || []).forEach(j => {
        if (j.match_score == null) return;
        const margin = j.match_score - j.opp_score;
        if (margin > 0 && (!bestWin || margin > bestWin.margin)) {
          bestWin = { team: k, journee: j.journee, date: j.date, score: j.match_score, opp: j.opp_score, opponent: j.opponent, margin };
        }
        if (margin < 0 && (!worstLoss || margin < worstLoss.margin)) {
          worstLoss = { team: k, journee: j.journee, date: j.date, score: j.match_score, opp: j.opp_score, opponent: j.opponent, margin };
        }
      });
    });
    // MVP = highest win rate, tie-broken by most cumulative V (i.e. 100% with most matches)
    const allPlayers = aggregateAllClubPlayers();
    const mvpPlayer = allPlayers.slice().sort((a,b) => b.winRate - a.winRate || b.vic - a.vic || b.played - a.played)[0] || null;
    const mvp = mvpPlayer ? {
      nom: mvpPlayer.nom, prenom: mvpPlayer.prenom, cls: mvpPlayer.cls,
      vic: mvpPlayer.vic, played: mvpPlayer.played, winRate: mvpPlayer.winRate,
      teams: mvpPlayer.teams, primaryTeam: primaryTeam(mvpPlayer),
    } : null;
    return { bestWin, worstLoss, mvp };
  }

  root.ACBB_UTILS = Object.assign(root.ACBB_UTILS, {
    aggregateClubStats, statusByPosition, topByWinRate, topByVolume,
    primaryTeam, evolutionByJournee, recordsOfPhase,
  });
})(window);

</script>
<script>
(function(){
  const U = window.ACBB_UTILS;
  let all = U.aggregateAllClubPlayers();
  function updateMeta(){
    const tp=all.length, tm=all.reduce((s,p)=>s+p.played,0), tw=all.reduce((s,p)=>s+p.vic,0);
    document.getElementById('meta').innerHTML =
      '<div><div class="v">'+tp+'</div><div class="l">Joueurs</div></div>'+
      '<div><div class="v">'+tm+'</div><div class="l">Présences</div></div>'+
      '<div><div class="v">'+tw+'</div><div class="l">Victoires</div></div>';
  }

  // Filter chips
  const FILTERS = [
    { id:'all', label:'TOUS', pools: U.TEAM_KEYS },
    { id:'n2', label:'N2', pools:['M2'] },
    { id:'r2', label:'R2', pools:['M3'] },
    { id:'r3', label:'R3', pools:['M4','M5'] },
    { id:'pr', label:'PR', pools:['M6','M7','M8','M9'] },
    { id:'d1', label:'D1', pools:['M10','M11'] },
    { id:'d2', label:'D2', pools:['M12','M13','M14','M15','M16','M17'] },
    { id:'pnf', label:'PN \u2640', pools:['F1'] },
    { id:'r1f', label:'R1 \u2640', pools:['F2'] },
    { id:'prf', label:'PR \u2640', pools:['F3'] },
  ];
  let activeFilter = 'all';

  const SORTS = [
    { id: 'pct', label: '% Victoires', fn: (a,b) => b.winRate - a.winRate || b.vic - a.vic },
    { id: 'vic', label: 'Victoires', fn: (a,b) => b.vic - a.vic || b.winRate - a.winRate },
    { id: 'played', label: 'Présences', fn: (a,b) => b.played - a.played || b.vic - a.vic },
    { id: 'name', label: 'Nom A→Z', fn: (a,b) => (a.nom+' '+a.prenom).localeCompare(b.nom+' '+b.prenom) },
    { id: 'cls', label: 'Classement', fn: (a,b) => {
      const ac = typeof a.cls === 'number' ? a.cls : 0;
      const bc = typeof b.cls === 'number' ? b.cls : 0;
      return bc - ac;
    }},
  ];
  let activeSort = 'pct';

  function renderFilters() {
    const el = document.getElementById('filters');
    el.innerHTML = FILTERS.map(f => {
      const ct = U.aggregateAllClubPlayers(f.pools).length;
      return `<button type="button" class="chip${f.id===activeFilter?' active':''}" data-id="${f.id}" aria-pressed="${f.id===activeFilter}">${f.label}<span class="ct">${ct}</span></button>`;
    }).join('');
    el.querySelectorAll('.chip').forEach(c => c.onclick = () => { activeFilter = c.dataset.id; renderAll(); });
  }

  function renderSort() {
    const s = SORTS.find(x=>x.id===activeSort);
    document.getElementById('sortLbl').textContent = s.label;
  }
  document.getElementById('sortBtn').onclick = () => {
    const idx = SORTS.findIndex(s=>s.id===activeSort);
    activeSort = SORTS[(idx+1) % SORTS.length].id;
    renderAll();
  };

  document.getElementById('search').addEventListener('input', renderAll);

  function renderAll() {
    renderFilters();
    renderSort();
    const f = FILTERS.find(x=>x.id===activeFilter);
    all = U.aggregateAllClubPlayers(f.pools);
    updateMeta();
    const q = document.getElementById('search').value.trim().toUpperCase();
    let rows = all.slice();
    if (q) {
      rows = rows.filter(r => (r.nom + ' ' + r.prenom).toUpperCase().includes(q));
    }
    const sort = SORTS.find(s=>s.id===activeSort);
    rows.sort(sort.fn);

    const list = document.getElementById('list');
    if (!rows.length) { list.innerHTML = '<div class="empty">Aucun joueur</div>'; return; }

    list.innerHTML = rows.map((p, i) => {
      const pct = p.winRate;
      const pctCls = pct >= 60 ? 'hi' : (pct >= 35 ? 'mid' : 'lo');
      let rkCls = '';
      if (activeSort === 'pct' || activeSort === 'vic') {
        if (i === 0) rkCls = 'top1';
        else if (i === 1) rkCls = 'top2';
        else if (i === 2) rkCls = 'top3';
      }
      const teamTags = p.teams.map(k => {
        const meta = U.LEVEL_META[k];
        const isF = k[0] === 'F';
        const count = p.teamCounts[k];
        return `<span class="team-tag${isF?' f':''}">
          <strong>${k}</strong>
          <span class="lvl">${meta?meta.short:''}</span>
          <span class="n">${count}j</span>
        </span>`;
      }).join('');

      return `
        <div class="player-card ${rkCls} anim-in">
          <div class="pc-top">
            <div class="pc-info">
              <div class="pc-name">${U.firstName(p)} ${p.nom}</div>
              <div class="pc-sub">
                <span>cl. ${U.clsDisplay(p.cls)}</span>
                <span class="dot"></span>
                <span>${p.played} présence${p.played>1?'s':''}</span>
                <span class="dot"></span>
                <span>${p.teams.length} équipe${p.teams.length>1?'s':''}</span>
              </div>
            </div>
            <div class="pc-stats">
              <div class="pc-stat-v">${p.vic}<span class="s">V</span></div>
              <div class="pc-stat-pct ${pctCls}">${pct}%</div>
            </div>
          </div>
          <div class="pc-bar"><i class="gauge" style="width:0%" data-w="${pct}%"></i></div>
          <div class="pc-teams">${teamTags}</div>
        </div>
      `;
    }).join('');

    requestAnimationFrame(() => {
      list.querySelectorAll('.gauge').forEach(g => {
        setTimeout(() => { g.style.width = g.dataset.w; }, 60);
      });
    });
  }

  renderAll();

  /* ===== Onglet "Niveau des équipes" =====
     Comparaison du classement MENSUEL réel (reconstruit au moment de chaque match),
     adversaires rencontrés vs joueurs ACBB alignés. Données : data/teams.json (robot). */
  let GMAX = 2400;  // échelle commune des barres (recalculée selon les données)

  function teamName(k){ return k[0]==='F' ? 'Équipe Féminine '+k.slice(1) : 'Équipe '+k.slice(1); }

  function lvlRow(r, name){
    const a = (typeof r.acbb==='number')?r.acbb:null, o = (typeof r.opp==='number')?r.opp:null;
    let diff = '<span class="adv-diff eq">—</span>';
    if(a!=null && o!=null){
      const d = a - o;  // >0 = ACBB joue plus fort que ses adversaires
      const cls = d>0?'up':(d<0?'down':'eq');
      diff = `<span class="adv-diff ${cls}">${d>0?'+':(d<0?'−':'±')}${Math.abs(d)} pts</span>`;
    }
    const bar = (label, v, cls) => `
      <div class="adv-bar ${cls}">
        <span class="bl">${label}</span>
        <div class="bt"><div class="bf" style="width:${v!=null?Math.round(v/GMAX*100):0}%"></div></div>
        <span class="bv">${v!=null?v:'—'}</span>
      </div>`;
    const meta = `Classement mensuel${r.pos?` · ${r.pos}`:''} · ${r.n} matchs`;
    return `
      <div class="adv-row">
        <div class="adv-row-top">
          <span class="adv-badge">${r.short||r.badge}</span>
          <span class="adv-name">${name}</span>
          ${diff}
        </div>
        <div class="adv-bars">
          ${bar('Adversaires', o, 'opp')}
          ${bar('ACBB', a, 'acbb')}
        </div>
        <div class="adv-meta">${meta}</div>
      </div>`;
  }

  async function renderAdverse(){
    let DATA;
    try{ DATA = await (await fetch('data/teams.json',{cache:'no-cache'})).json(); }
    catch(e){ document.getElementById('advDivisions').innerHTML='<div class="adv-intro">Données indisponibles.</div>'; return; }
    const all = [].concat(DATA.teams||[], DATA.divisions||[]);
    GMAX = Math.max(2000, ...all.flatMap(r=>[r.acbb||0, r.opp||0])) * 1.05;
    const byGenre = (arr, name) =>
      '<div class="adv-genre">Championnat Masculin</div>' + arr.filter(r=>r.genre==='M').map(r=>lvlRow(r,name(r))).join('') +
      '<div class="adv-genre">Championnat Féminin</div>' + arr.filter(r=>r.genre==='F').map(r=>lvlRow(r,name(r))).join('');
    document.getElementById('advDivisions').innerHTML =
      '<div class="adv-h">Par division</div>' + byGenre(DATA.divisions||[], r=>r.label);
    document.getElementById('advTeams').innerHTML =
      '<div class="adv-h">Par équipe</div>' + byGenre(DATA.teams||[], r=>teamName(r.key));
  }

  /* ===== Bascule d'onglets ===== */
  let advRendered = false;
  document.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab').forEach(b => { b.classList.toggle('active', b===btn); b.setAttribute('aria-selected', b===btn ? 'true' : 'false'); });
      document.getElementById('view-joueurs').hidden = (tab !== 'joueurs');
      document.getElementById('view-adverse').hidden = (tab !== 'adverse');
      if(tab === 'adverse' && !advRendered){ renderAdverse(); advRendered = true; }
      window.scrollTo({top:0, behavior:'smooth'});
    });
  });
})();
</script>
