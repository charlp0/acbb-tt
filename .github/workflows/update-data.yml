name: Mise à jour données FFTT

on:
  schedule:                    # lun + mer, 4 créneaux (les crons GitHub sont souvent retardés/sautés)
    - cron: '0 8 * * 1,3'      # le 1er qui passe met à jour ; les suivants voient "déjà fait aujourd'hui" et ne font rien
    - cron: '0 12 * * 1,3'
    - cron: '0 16 * * 1,3'
    - cron: '0 20 * * 1,3'
  workflow_dispatch:           # déclenchement manuel (bouton "Run workflow" / gh workflow run)
    inputs:
      full:
        description: 'Rebuild complet (1 = tout reconstruire, ignore le cache)'
        default: '0'

permissions:
  contents: write
  issues: write

concurrency:
  group: fftt-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Restaurer le cache incrémental (état + adversaires)
        uses: actions/cache@v4
        with:
          path: |
            data/_state.json
            data/_oppcache.json
          key: fftt-cache-${{ github.run_id }}    # toujours unique -> sauvegarde à chaque run
          restore-keys: |
            fftt-cache-                            # restaure le cache le plus récent
      - name: Génération des profils joueurs
        env:
          FFTT_ID: ${{ secrets.FFTT_ID }}
          FFTT_PWD: ${{ secrets.FFTT_PWD }}
          FFTT_TOP: '0'          # 0 = tout le club ayant joué ≥1 match cette saison
          FFTT_FULL: ${{ github.event.inputs.full || '0' }}   # 1 = rebuild complet (manuel)
          FFTT_SKIP_IF_FRESH: ${{ github.event_name == 'schedule' && '1' || '0' }}   # créneaux multiples : ignore si déjà à jour aujourd'hui (runs programmés uniquement)
        run: python3 scripts/fftt_build.py
      - name: Génération data-driven des pages d'équipe (site.json)
        env:
          FFTT_ID: ${{ secrets.FFTT_ID }}
          FFTT_PWD: ${{ secrets.FFTT_PWD }}
          FFTT_SKIP_IF_FRESH: ${{ github.event_name == 'schedule' && '1' || '0' }}
        run: python3 scripts/fftt_site.py
      - name: Commit si changement
        run: |
          git config user.name "acbb-data-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Aucun changement dans les données."
          else
            git commit -m "data: mise à jour auto $(date -u +%Y-%m-%d)"
            # les données générées font foi : en cas de divergence, on garde notre version (-X ours)
            git fetch origin main
            git merge -s recursive -X ours origin/main -m "merge auto (priorité données robot)" || true
            git push || (git fetch origin main && git merge -s recursive -X ours origin/main -m "merge auto" && git push)
          fi
      - name: Alerte si échec (issue GitHub)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create --repo "$GITHUB_REPOSITORY" \
            --title "🤖 Échec mise à jour données FFTT — $(date -u +%d/%m/%Y)" \
            --body "Le run a échoué : https://github.com/$GITHUB_REPOSITORY/actions/runs/${{ github.run_id }}

          Les données en prod n'ont pas été modifiées (garde-fou). Relancer manuellement : onglet Actions → Run workflow." || true
