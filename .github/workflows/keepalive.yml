name: Keepalive mensuel

# GitHub désactive les workflows programmés après 60 jours sans activité (commit)
# sur le repo. Ce commit vide mensuel maintient le repo "actif" pour que le
# ping Supabase (et les crons du robot à la reprise) ne soient jamais coupés.
on:
  schedule:
    - cron: '0 6 1 * *'   # le 1er de chaque mois, ~8h Paris
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          git config user.name "acbb-keepalive"
          git config user.email "bot@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive mensuel (maintient les crons GitHub actifs)"
          git push
