  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root {
      --blue: #2563eb; --blue-dark: #1e3a5f; --blue-light: #eff6ff;
      --green: #22c55e; --green-dark: #16a34a;
      --orange: #f97316; --red: #ef4444;
      --gray: #6b7280; --gray-light: #f3f4f6; --gray-border: #e5e7eb;
      --radius: 12px; --radius-sm: 8px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc; color: #1f2937; line-height: 1.5;
    }
    .container { max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; }

    .header {
      background: linear-gradient(135deg, var(--blue-dark), var(--blue));
      color: white; padding: 20px 16px 16px;
    }
    .header h1 { font-size: 1.3rem; font-weight: 700; }
    .header p { font-size: 0.8rem; opacity: 0.85; margin-top: 4px; line-height: 1.4; }
    .back-link { color: white; opacity: 0.8; text-decoration: none; font-size: 0.85rem; display: inline-block; margin-bottom: 6px; }
    .back-link:hover { opacity: 1; }

    .team-selector {
      display: flex; gap: 6px; padding: 12px 16px; overflow-x: auto;
      background: white; border-bottom: 1px solid var(--gray-border);
      position: sticky; top: 0; z-index: 10;
    }
    .team-pill {
      padding: 6px 14px; border-radius: 20px; border: 2px solid var(--gray-border);
      background: white; font-weight: 600; font-size: 0.85rem; cursor: pointer;
      white-space: nowrap; transition: all 0.15s;
    }
    .team-pill:hover { border-color: var(--blue); color: var(--blue); }
    .team-pill.active { background: var(--blue); color: white; border-color: var(--blue); }

    .info-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 16px; background: var(--blue-light); border-bottom: 1px solid var(--gray-border);
    }
    .info-bar .count { font-weight: 700; font-size: 1.1rem; color: var(--blue-dark); }
    .info-bar .subtitle { font-size: 0.8rem; color: var(--gray); }

    .player-list { padding: 0 0 20px; }

    .player-item {
      display: flex; align-items: center; padding: 10px 16px;
      border-bottom: 1px solid var(--gray-border); gap: 12px;
    }
    .player-rank {
      width: 28px; height: 28px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; font-size: 0.75rem;
      font-weight: 700; flex-shrink: 0; background: var(--gray-light); color: var(--gray);
    }

    .player-info { flex: 1; min-width: 0; }
    .player-name { font-weight: 600; font-size: 0.95rem; }
    .player-tags { display: flex; gap: 4px; margin-top: 3px; flex-wrap: wrap; }

    .tag {
      font-size: 0.7rem; padding: 1px 6px; border-radius: 4px; font-weight: 600;
    }
    .tag.team { background: #dbeafe; color: var(--blue); }

    .player-cls {
      flex-shrink: 0; font-weight: 700; font-size: 0.9rem;
      color: var(--blue-dark); min-width: 52px; text-align: right;
    }
    .player-cls.national { color: #7c3aed; }

    .empty {
      padding: 40px 20px; text-align: center; color: var(--gray);
    }
  </style>
</head>

}}, {"nom": "DRODELOT", "prenom": "Max", "cls": 522, "pools": {"M17": 2}}];

    var MASC_POOLS = ["M2","M3","M4","M5","M6","M7","M8","M9","M10","M11","M12","M13","M14","M15","M16","M17"];

    function higherPools(target) {
      var idx = MASC_POOLS.indexOf(target);
      return idx > 0 ? MASC_POOLS.slice(0, idx) : [];
    }

    // Sort desc : N-ranks (nationaux) en haut, puis classement numerique decroissant
    function clsSortValue(cls) {
      if (typeof cls === 'string' && cls.startsWith('N')) {
        // N1 > N999 : plus petit numero = plus fort
        return 10000 - parseInt(cls.substring(1));
      }
      return cls; // numeric, bigger = higher
    }

    function formatCls(cls) {
      return cls;
    }

    var currentTeam = 'M11';

    function render(team) {
      currentTeam = team;
      var higher = higherPools(team);
      var available = [];

      PLAYERS.forEach(function(p) {
        var higherCount = 0;
        var higherDetails = [];
        higher.forEach(function(pool) {
          if (p.pools[pool]) {
            higherCount += p.pools[pool];
            higherDetails.push(pool + '(' + p.pools[pool] + ')');
          }
        });
        if (higherCount < 2) {
          available.push({
            nom: p.nom, prenom: p.prenom, cls: p.cls,
            higherCount: higherCount, higherDetails: higherDetails,
            pools: p.pools
          });
        }
      });

      // Sort by classement DESC (meilleurs en haut)
      available.sort(function(a, b) { return clsSortValue(b.cls) - clsSortValue(a.cls); });

      document.getElementById('playerCount').textContent = available.length;

      document.querySelectorAll('.team-pill').forEach(function(pill) {
        pill.classList.toggle('active', pill.dataset.team === team);
      });

      var html = '';
      if (available.length === 0) {
        html = '<div class="empty">Aucun joueur eligible pour ' + team + '</div>';
      } else {
        available.forEach(function(p, i) { html += renderPlayer(p, i + 1); });
      }
      document.getElementById('playerList').innerHTML = html;
    }

    function renderPlayer(p, rank) {
      var isNat = (typeof p.cls === 'string' && p.cls.charAt(0) === 'N') || (typeof p.cls === 'number' && p.cls >= 2000);
      var clsCls = isNat ? 'player-cls national' : 'player-cls';

      var tags = '';
      Object.keys(p.pools).forEach(function(pool) {
        tags += '<span class="tag team">' + pool + ' x' + p.pools[pool] + '</span>';
      });

      return '<div class="player-item">' +
        '<div class="player-rank">' + rank + '</div>' +
        '<div class="player-info">' +
          '<div class="player-name">' + p.prenom + ' ' + p.nom + '</div>' +
          '<div class="player-tags">' + tags + '</div>' +
        '</div>' +
        '<div class="' + clsCls + '">' + formatCls(p.cls) + '</div>' +
      '</div>';
    }

    function initSelector() {
      var sel = document.getElementById('teamSelector');
      MASC_POOLS.forEach(function(team) {
        var btn = document.createElement('button');
        btn.className = 'team-pill' + (team === currentTeam ? ' active' : '');
        btn.textContent = team;
        btn.dataset.team = team;
        btn.onclick = function() { render(team); };
        sel.appendChild(btn);
      });
    }

    initSelector();
    render(currentTeam);
</script>
